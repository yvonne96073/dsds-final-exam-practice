<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>資料科學期末互動練習</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #1d252d;
      --muted: #65717f;
      --line: #d8dee6;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --accent: #b45309;
      --danger: #b91c1c;
      --danger-bg: #fff1f2;
      --ok: #15803d;
      --ok-bg: #ecfdf3;
      --focus: #2563eb;
      --shadow: 0 18px 45px rgba(20, 34, 51, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, #eef7f6 0, #f6f7f9 260px),
        var(--bg);
      font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      line-height: 1.55;
    }

    button, input { font: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(230px, 300px) minmax(0, 1fr);
    }

    aside {
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, .82);
      padding: 28px 22px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    main {
      padding: 32px;
      display: grid;
      align-content: start;
      gap: 22px;
    }

    .brand {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }

    .brand h1 {
      font-size: 1.35rem;
      line-height: 1.25;
      margin: 0;
      letter-spacing: 0;
    }

    .brand p {
      color: var(--muted);
      margin: 0;
      font-size: .94rem;
    }

    .stats {
      display: grid;
      gap: 10px;
      margin: 22px 0;
    }

    .account {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      margin: 18px 0;
    }

    .account-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-weight: 800;
    }

    .sync-status {
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.45;
    }

    .account-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .stat span:first-child {
      color: var(--muted);
      font-size: .9rem;
    }

    .stat strong {
      font-size: 1.05rem;
    }

    .topic-list {
      display: grid;
      gap: 8px;
    }

    .topic-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: .88rem;
      color: var(--muted);
      padding: 8px 0;
      border-bottom: 1px solid #edf0f3;
    }

    .weak {
      color: var(--danger);
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      max-width: 980px;
    }

    .mode-area {
      display: grid;
      gap: 8px;
    }

    .mode-help {
      color: var(--muted);
      font-size: .9rem;
    }

    .mode-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .seg {
      border: 1px solid var(--line);
      color: var(--ink);
      background: #fff;
      min-height: 40px;
      padding: 8px 13px;
      border-radius: 8px;
      cursor: pointer;
    }

    .seg.active {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    .panel {
      max-width: 980px;
      background: var(--panel);
      border: 1px solid rgba(216, 222, 230, .9);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .question {
      padding: 28px;
      display: grid;
      gap: 20px;
    }

    .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: .92rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 10px;
      background: #eef7f6;
      color: var(--brand-dark);
      font-weight: 700;
      font-size: .82rem;
    }

    .question h2 {
      font-size: clamp(1.15rem, 1.7vw, 1.55rem);
      margin: 0;
      line-height: 1.45;
      letter-spacing: 0;
    }

    .confidence {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #f9fbfc;
    }

    .confidence strong {
      font-size: .94rem;
    }

    .confidence-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .confidence label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 10px;
      background: #fff;
      cursor: pointer;
    }

    .confidence input {
      accent-color: var(--brand);
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      background: #fff;
      cursor: pointer;
      min-height: 58px;
      align-items: start;
    }

    .option:hover {
      border-color: #a9b5c3;
      background: #fbfcfd;
    }

    .option input {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: var(--brand);
    }

    .option.correct {
      border-color: #86efac;
      background: var(--ok-bg);
    }

    .option.incorrect {
      border-color: #fecdd3;
      background: var(--danger-bg);
    }

    .letter {
      font-weight: 800;
      color: var(--brand-dark);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 800;
    }

    .primary {
      background: var(--brand);
      color: #fff;
    }

    .primary:hover { background: var(--brand-dark); }

    .secondary {
      background: #e8edf2;
      color: var(--ink);
    }

    .secondary:hover { background: #dce3ea; }

    .ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink);
    }

    .feedback {
      border-top: 1px solid var(--line);
      padding: 0 28px 28px;
      display: none;
    }

    .feedback.show {
      display: grid;
      gap: 14px;
    }

    .result {
      border-radius: 8px;
      padding: 14px;
      font-weight: 800;
    }

    .result.ok {
      background: var(--ok-bg);
      color: var(--ok);
    }

    .result.bad {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .result.review {
      background: #fff7ed;
      color: #9a3412;
    }

    .explain-list {
      display: grid;
      gap: 10px;
    }

    .explain {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .explain strong { display: block; margin-bottom: 4px; }

    .explain.summary {
      border-color: #99f6e4;
      background: #f0fdfa;
      color: #134e4a;
    }

    .review-box {
      max-width: 980px;
      padding: 20px;
      display: none;
    }

    .review-box.show {
      display: grid;
      gap: 12px;
    }

    .dashboard {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .dashboard h2 {
      margin: 0;
      font-size: 1.15rem;
    }

    .dash-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .dash-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
      display: grid;
      gap: 6px;
      min-height: 92px;
    }

    .dash-card span {
      color: var(--muted);
      font-size: .88rem;
    }

    .dash-card strong {
      font-size: 1.35rem;
      line-height: 1.2;
    }

    .bars {
      display: grid;
      gap: 10px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(130px, 210px) 1fr auto;
      gap: 10px;
      align-items: center;
      font-size: .9rem;
    }

    .bar-track {
      height: 10px;
      background: #edf0f3;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--brand);
      border-radius: inherit;
    }

    .wrong-list {
      display: grid;
      gap: 10px;
    }

    .wrong-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 5px;
    }

    .wrong-item small {
      color: var(--muted);
    }

    .wrong-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .wrong-actions button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
      cursor: pointer;
    }

    .wrong-detail {
      display: none;
      gap: 8px;
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .wrong-item.open .wrong-detail {
      display: grid;
    }

    .wrong-choice {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 4px;
      background: #f8fafc;
    }

    .wrong-choice.correct {
      border-color: #bbf7d0;
      background: #f0fdf4;
    }

    .wrong-choice.missed,
    .wrong-choice.trap {
      border-color: #fecaca;
      background: #fff1f2;
    }

    .wrong-summary {
      border: 1px solid #99f6e4;
      border-radius: 8px;
      padding: 10px;
      background: #f0fdfa;
      color: #134e4a;
      display: grid;
      gap: 4px;
    }

    .notes-rail {
      padding: 30px 28px 48px 0;
      align-self: start;
      position: sticky;
      top: 0;
      height: 100vh;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .notes-toggle {
      width: 100%;
      border: 1px solid #cfe0dd;
      border-radius: 8px;
      min-height: 44px;
      padding: 10px 12px;
      background: #fff;
      color: #0b5f59;
      font-weight: 850;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(23, 32, 42, .05);
    }

    .mistake-notes {
      display: none;
      max-height: calc(100vh - 112px);
      overflow: auto;
      border: 1px solid #dce7e5;
      border-radius: 8px;
      background: rgba(255, 255, 255, .94);
      box-shadow: var(--shadow);
      padding: 16px;
      gap: 12px;
    }

    .notes-rail.open .mistake-notes {
      display: grid;
    }

    .mistake-notes h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .note-muted {
      margin: 0;
      color: var(--muted);
      font-size: .88rem;
    }

    .note-card {
      display: grid;
      gap: 8px;
      border: 1px solid #e2e8ee;
      border-radius: 8px;
      background: #fbfcfd;
      padding: 12px;
    }

    .note-card strong {
      color: #0b5f59;
    }

    .note-card p {
      margin: 0;
    }

    .note-card section {
      display: grid;
      gap: 4px;
      border-top: 1px solid #e8eef3;
      padding-top: 8px;
    }

    .note-card h3 {
      margin: 0;
      font-size: .92rem;
      color: #1f2937;
    }

    .note-card ul {
      margin: 0;
      padding-left: 18px;
    }

    .note-card li {
      margin: 4px 0;
    }

    .diagnosis {
      display: grid;
      gap: 8px;
      border: 1px solid #fed7aa;
      background: #fff7ed;
      border-radius: 8px;
      padding: 12px;
      color: #7c2d12;
    }

    .diagnosis ul {
      margin: 0;
      padding-left: 20px;
    }

    .mini-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .95rem;
      overflow-wrap: anywhere;
    }

    .mini-table th,
    .mini-table td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 10px 8px;
      vertical-align: top;
    }

    @media (max-width: 780px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        padding: 18px;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .dash-grid {
        grid-template-columns: 1fr;
      }

      .bar-row {
        grid-template-columns: 1fr;
      }

      .question,
      .feedback {
        padding-left: 18px;
        padding-right: 18px;
      }
    }

    /* Visual refresh for the shared practice app. */
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667383;
      --line: #dce3ea;
      --brand: #0f766e;
      --brand-dark: #0b5f59;
      --accent: #2563eb;
      --danger: #be123c;
      --danger-bg: #fff1f2;
      --ok: #15803d;
      --ok-bg: #ecfdf5;
      --shadow: 0 20px 55px rgba(23, 32, 42, .08);
    }

    body {
      background:
        linear-gradient(180deg, #eaf4f2 0, #f4f6f8 310px),
        var(--bg);
      font-size: 16px;
    }

    .app {
      grid-template-columns: 300px minmax(640px, 1fr) minmax(380px, 520px);
    }

    aside {
      background: rgba(255, 255, 255, .92);
      border-right: 1px solid #e5eaf0;
      padding: 24px;
    }

    main {
      width: min(1120px, 100%);
      padding: 30px clamp(18px, 3vw, 44px) 48px;
      gap: 18px;
    }

    .brand {
      border-bottom: 1px solid #e7edf2;
      margin-bottom: 18px;
      padding-bottom: 18px;
    }

    .brand h1 {
      font-size: 1.22rem;
    }

    .brand p {
      font-size: .9rem;
    }

    .stats {
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 16px 0;
    }

    .stat,
    .account {
      border: 1px solid #e3e9ef;
      box-shadow: none;
      background: #fff;
    }

    .stat {
      grid-template-columns: 1fr;
      gap: 4px;
      padding: 12px;
      min-height: 78px;
    }

    .stat strong {
      font-size: 1.22rem;
      color: var(--ink);
    }

    .account {
      padding: 14px;
      margin: 14px 0 18px;
    }

    .account-title {
      font-size: .96rem;
    }

    .account-actions .btn {
      width: 100%;
      justify-content: center;
    }

    aside section:last-child {
      background: #fff;
      border: 1px solid #e3e9ef;
      border-radius: 8px;
      padding: 14px;
    }

    aside section:last-child h2 {
      color: var(--ink);
      font-size: .95rem !important;
      margin-bottom: 8px !important;
    }

    .topic-row {
      border-bottom: 1px solid #eef2f5;
      color: #596675;
      font-size: .86rem;
      padding: 7px 0;
    }

    .toolbar {
      max-width: none;
      align-items: flex-start;
      background: #fff;
      border: 1px solid #e3e9ef;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(23, 32, 42, .05);
    }

    .mode-area {
      gap: 10px;
    }

    .mode-group {
      gap: 6px;
    }

    .mode-help {
      max-width: 760px;
      color: #5f6d7d;
    }

    .seg {
      border-color: #d9e1e8;
      background: #f8fafc;
      color: #26313d;
      min-height: 38px;
      padding: 8px 12px;
      font-weight: 750;
    }

    .seg:hover {
      background: #eef5f4;
      border-color: #c8d9d6;
    }

    .seg.active {
      background: #0f766e;
      color: #fff;
      border-color: #0f766e;
    }

    .panel {
      max-width: none;
      border: 1px solid #e0e7ee;
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .question {
      padding: clamp(20px, 3vw, 34px);
      gap: 22px;
    }

    .question h2 {
      max-width: 900px;
      font-size: clamp(1.25rem, 2vw, 1.72rem);
      line-height: 1.42;
    }

    .meta {
      gap: 10px;
    }

    .pill {
      border-radius: 8px;
      background: #eaf4f2;
      color: #0b5f59;
    }

    #sourceText {
      color: #6b7786;
    }

    .options {
      gap: 12px;
    }

    .option {
      grid-template-columns: 24px 1fr;
      border-color: #dfe6ed;
      padding: 14px 16px;
      transition: border-color .15s ease, background .15s ease, transform .15s ease;
    }

    .option:hover {
      background: #f8fbfb;
      border-color: #9ccac4;
      transform: translateY(-1px);
    }

    .letter {
      color: #0f766e;
    }

    .confidence {
      background: #f8fafc;
      border-color: #e1e8ef;
    }

    .confidence label {
      border-color: #dce4eb;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      min-height: 42px;
    }

    .primary {
      background: #0f766e;
    }

    .secondary {
      background: #edf2f7;
    }

    .ghost {
      background: #fff;
      border-color: #d9e1e8;
    }

    .feedback {
      border-top: 0;
      padding: 0 clamp(20px, 3vw, 34px) clamp(22px, 3vw, 34px);
    }

    .feedback.show {
      gap: 12px;
    }

    .result,
    .diagnosis,
    .explain,
    .wrong-item,
    .dash-card {
      border-radius: 8px;
    }

    .dashboard {
      padding: clamp(20px, 3vw, 28px);
      gap: 20px;
    }

    .dashboard h2 {
      font-size: 1.08rem;
      color: #202a35;
    }

    .dash-grid {
      grid-template-columns: repeat(3, minmax(160px, 1fr));
    }

    .dash-card {
      background: #f9fbfc;
      border-color: #e2e8ee;
      min-height: 104px;
    }

    .dash-card strong {
      font-size: 1.48rem;
      color: #0b5f59;
    }

    .bar-row {
      grid-template-columns: minmax(150px, 220px) minmax(120px, 1fr) 44px;
    }

    .bar-track {
      background: #e8edf2;
    }

    .bar-fill {
      background: #2563eb;
    }

    .wrong-item {
      border-color: #e1e7ed;
      background: #fbfcfd;
    }

    .review-box {
      max-width: none;
    }

    @media (max-width: 1360px) {
      .app {
        grid-template-columns: 280px minmax(0, 1fr);
      }

      .notes-rail {
        position: fixed;
        top: auto;
        right: 18px;
        bottom: 18px;
        z-index: 20;
        width: min(520px, calc(100vw - 36px));
        height: auto;
        padding: 0;
      }

      .mistake-notes {
        max-height: min(560px, calc(100vh - 92px));
      }
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid #e3e9ef;
      }

      main {
        padding: 18px;
      }

      .notes-rail {
        right: 14px;
        bottom: 14px;
      }
    }

    @media (max-width: 680px) {
      .stats,
      .dash-grid {
        grid-template-columns: 1fr;
      }

      .toolbar {
        flex-direction: column;
      }

      .toolbar .btn {
        width: 100%;
      }

      .mode-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
      }

      .bar-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <section class="brand">
        <h1>資料科學期末互動練習</h1>
        <p>多選題模式。答錯後會追問同概念的變形題。</p>
      </section>

      <section class="stats" aria-label="練習統計">

    function safeParseJson(text, fallback = null) {
      try {
        return JSON.parse(text);
      } catch {
        return fallback;
      }
    }

    function parseFirebaseConfigInput(text) {
      const raw = (text || "").trim();
      if (!raw) return null;
      const direct = safeParseJson(raw);
      if (direct?.apiKey) return direct;

      const withoutComments = raw
        .replace(/\/\/.*$/gm, "")
        .replace(/\/\*[\s\S]*?\*\//g, "");

      const candidates = [];
      const configIndex = withoutComments.search(/firebaseConfig\s*=/);
      if (configIndex >= 0) {
        const braceStart = withoutComments.indexOf("{", configIndex);
        const extracted = extractObjectLiteral(withoutComments, braceStart);
        if (extracted) candidates.push(extracted);
      }

      for (let i = 0; i < withoutComments.length; i++) {
        if (withoutComments[i] === "{") {
          const extracted = extractObjectLiteral(withoutComments, i);
          if (extracted) candidates.push(extracted);
        }
      }

      for (const candidate of candidates) {
        const config = parseLooseObject(candidate);
        if (config?.apiKey && config?.authDomain && config?.projectId && config?.appId) return config;
      }
      return parseFirebaseKeyValueLines(withoutComments);
    }

    function extractObjectLiteral(text, start) {
      if (start < 0 || text[start] !== "{") return null;
      let depth = 0;
      let quote = null;
      let escaped = false;
      for (let i = start; i < text.length; i++) {
        const char = text[i];
        if (quote) {
          if (escaped) {
            escaped = false;
          } else if (char === "\\") {
            escaped = true;
          } else if (char === quote) {
            quote = null;
          }
          continue;
        }
        if (char === '"' || char === "'") {
          quote = char;
        } else if (char === "{") {
          depth += 1;
        } else if (char === "}") {
          depth -= 1;
          if (depth === 0) return text.slice(start, i + 1);
        }
      }
      return null;
    }

    function parseLooseObject(objectText) {
      const normalized = objectText
        .replace(/(['"])?([A-Za-z_$][\w$]*)\1\s*:/g, '"$2":')
        .replace(/'/g, '"')
        .replace(/,\s*}/g, "}");
      return safeParseJson(normalized);
    }

    function parseFirebaseKeyValueLines(text) {
      const keys = ["apiKey", "authDomain", "projectId", "storageBucket", "messagingSenderId", "appId"];
      const config = {};
      keys.forEach((key) => {
        const pattern = new RegExp(`${key}\\s*:\\s*["']([^"']+)["']`);
        const match = text.match(pattern);
        if (match) config[key] = match[1];
      });
      return config.apiKey && config.authDomain && config.projectId && config.appId ? config : null;
    }

    function applySnapshot(snapshot) {
      if (!snapshot || typeof snapshot !== "object") return;
      state.answered = Number(snapshot.answered) || 0;
      state.correct = Number(snapshot.correct) || 0;
      state.mode = snapshot.mode || "adaptive";
      state.history = Array.isArray(snapshot.history) ? snapshot.history : [];
      state.dueQueue = Array.isArray(snapshot.dueQueue) ? snapshot.dueQueue : [];
      state.examIndex = Number(snapshot.examIndex) || 0;
      state.examTotal = Number(snapshot.examTotal) || 20;
      state.studyCursor = Number(snapshot.studyCursor) || 0;
      state.lastWrongTopic = snapshot.lastWrongTopic || null;
      state.notesOpen = Boolean(snapshot.notesOpen);
      state.notesDirty = Boolean(snapshot.notesDirty);
      state.lastReviewQuestionId = snapshot.lastReviewQuestionId || null;
      Object.keys(topics).forEach((key) => {
        state.weak[key] = Number(snapshot.weak?.[key]) || 0;
        state.topicAttempts[key] = Number(snapshot.topicAttempts?.[key]) || 0;
        state.topicCorrect[key] = Number(snapshot.topicCorrect?.[key]) || 0;
      });
      Object.keys(state.mistakes).forEach((key) => {
        state.mistakes[key] = Number(snapshot.mistakes?.[key]) || 0;
      });
      Object.keys(state.confidenceCounts).forEach((key) => {
        state.confidenceCounts[key] = Number(snapshot.confidenceCounts?.[key]) || 0;
      });
      state.answerLog = Array.isArray(snapshot.answerLog) ? snapshot.answerLog : [];
      state.wrongBook = Array.isArray(snapshot.wrongBook) ? snapshot.wrongBook : [];
    }

    function saveProgress() {
      const snapshot = getPersistableState();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
      window.saveCloudProgress?.(snapshot);
      renderDashboard();
      return snapshot;
    }

    function loadLocalProgress() {
      const snapshot = safeParseJson(localStorage.getItem(STORAGE_KEY));
      if (snapshot) applySnapshot(snapshot);
    }

      state.history = [];
      state.dueQueue = [];
      state.examQueue = [];
      state.examIndex = 0;
      state.studyCursor = 0;
      state.lastWrongTopic = null;
      Object.keys(state.weak).forEach((key) => { state.weak[key] = 0; });
      Object.keys(state.topicAttempts).forEach((key) => { state.topicAttempts[key] = 0; });
      Object.keys(state.topicCorrect).forEach((key) => { state.topicCorrect[key] = 0; });
      Object.keys(state.mistakes).forEach((key) => { state.mistakes[key] = 0; });
      Object.keys(state.confidenceCounts).forEach((key) => { state.confidenceCounts[key] = 0; });
      state.answerLog = [];
      state.wrongBook = [];
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function chooseQuestion() {
      if (state.mode === "exam") {
        if (!state.examQueue.length || state.examIndex >= state.examQueue.length) startExam();
        return state.examQueue[state.examIndex];
      }

      if (state.dueQueue.length && state.mode === "adaptive") {
        const target = state.dueQueue.shift();
        const candidates = questionBank.filter((q) => q.topic === target && !state.history.slice(-3).includes(q.id));
        if (candidates.length) return candidates[Math.floor(Math.random() * candidates.length)];
      }

      const recent = new Set(state.history.slice(-5));
      let pool = questionBank.filter((q) => !recent.has(q.id));

      if (pool.length === 0) pool = [...questionBank];

      if (state.mode === "weak") {
        const weakOnly = Object.entries(state.weak)
          .filter(([, count]) => count > 0)
          .map(([topic]) => topic);
        const targeted = pool.filter((q) => weakOnly.includes(q.topic));
        if (targeted.length) return targeted[Math.floor(Math.random() * targeted.length)];
      }

      if (state.mode === "adaptive") {
        for (let i = 0; i < topicOrder.length; i++) {
          const target = topicOrder[state.studyCursor % topicOrder.length];
          state.studyCursor += 1;
          const targeted = pool.filter((q) => q.topic === target);
          if (targeted.length) return targeted[Math.floor(Math.random() * targeted.length)];
        }
      }

      return pool[Math.floor(Math.random() * pool.length)];
    }

    function masteredQuestionIds() {
      const latest = new Map();
      state.answerLog.forEach((entry) => {
        latest.set(entry.questionId, entry);
      });
      return new Set(
        [...latest.values()]
          .filter((entry) => entry.isCorrect && entry.confidence === "sure")
          .map((entry) => entry.questionId)
      );
    }

    function startExam() {
      const mastered = masteredQuestionIds();
      const unseenOrUnstable = questionBank.filter((q) => !mastered.has(q.id));
      const masteredFallback = questionBank.filter((q) => mastered.has(q.id));
      const examPool = unseenOrUnstable.length >= state.examTotal
        ? unseenOrUnstable
        : [...unseenOrUnstable, ...shuffle(masteredFallback)];
      state.examQueue = shuffle(examPool).slice(0, Math.min(state.examTotal, examPool.length));
      state.examIndex = 0;
    }

    function renderQuestion(question) {
      state.current = question;
      state.locked = false;
      state.history.push(question.id);
      els.topicPill.textContent = topics[question.topic];
      updateQuestionCounter();
      els.sourceText.textContent = question.source;
      els.questionText.textContent = question.prompt;
      els.optionsForm.innerHTML = "";
      els.feedbackPanel.classList.remove("show");
      els.reviewBox.classList.remove("show");
      els.reviewBtn.textContent = "看本題觀念表";
      els.reviewBtn.setAttribute("aria-expanded", "false");
      els.submitBtn.disabled = false;
      els.confidencePanel.querySelector('input[value="partial"]').checked = true;

      question.options.forEach(([letter, text]) => {
        const label = document.createElement("label");
        label.className = "option";
        label.innerHTML = `
          <input type="checkbox" name="answer" value="${letter}" />
          <span><span class="letter">${letter}.</span> ${text}</span>
        `;
        els.optionsForm.appendChild(label);
      });
    }

    function selectedLetters() {
      return [...els.optionsForm.querySelectorAll("input:checked")].map((input) => input.value);
    }

    function arraysEqualSet(a, b) {
      if (a.length !== b.length) return false;
      const set = new Set(a);
      return b.every((item) => set.has(item));
    }

    function getConfidence() {
      return els.confidencePanel.querySelector("input[name='confidence']:checked")?.value || "partial";
    }

    function updateQuestionCounter() {
      if (!els.questionCounter) return;
      if (state.mode === "exam") {
        const total = state.examQueue.length || state.examTotal;
        const current = Math.min(state.examIndex + 1, total || state.examTotal);
        els.questionCounter.textContent = `模擬考第 ${current} / ${total || state.examTotal} 題${state.locked ? "（已作答）" : ""}`;
        return;
      }
      const current = Math.max(1, state.answered + (state.locked ? 0 : 1));
      els.questionCounter.textContent = `第 ${current} 題${state.locked ? "（已作答）" : ""}`;
    }

    function inferMistakes(question, selected, correct, isCorrect, confidence) {
      const selectedWrong = question.options.filter(([letter, , answer]) => selected.includes(letter) && !answer);
      const missedCorrect = question.options.filter(([letter, , answer]) => correct.includes(letter) && !selected.includes(letter) && answer);
      const text = [...selectedWrong, ...missedCorrect].map((opt) => opt[1]).join(" ").toLowerCase();
      const reasons = [];

      if (isCorrect && confidence === "sure") return reasons;

      if (/tp|fp|fn|recall|precision|threshold|auc|roc|accuracy/.test(text) || question.topic === "eval") {
        reasons.push(["metric", "分類評估指標混淆：特別注意 Recall 的分母是 TP+FN，Precision 的分母是 TP+FP。"]);
      }
      if (/p-value|alpha|reject|h0|independent|larger|smaller|low|high|greater|less/.test(text) || question.topic === "chi") {
        reasons.push(["direction", "方向判斷需要加強：p-value 小才拒絕 H0；impurity 越低越純；AUC 越大通常越好。"]);
      }
      if (/t-test|anova|chi-square|proportion|f-test|categorical|mean|variance/.test(text) || question.topic === "stat") {
        reasons.push(["method", "方法選擇混淆：Chi-square 看類別對類別；t-test 看兩組平均；ANOVA 看三組以上平均。"]);
      }
      if (/c5|cart|gini|entropy|bagging|boosting|random forest|tree/.test(text) || question.topic === "tree" || question.topic === "ensemble") {
        reasons.push(["model", "模型差異混淆：C5.0 對 entropy，CART 對 Gini；Bagging 平行，Boosting 序列修錯。"]);
      }
      if (/causality|causal|definitely/.test(text) || question.topic === "project") {
        reasons.push(["causality", "因果推論陷阱：feature importance 或統計關聯不等於因果。"]);
      }
      if (confidence === "guess") {
        reasons.push(["formula", "低信心答對/答錯都要複習：這題目前比較像猜中，系統會安排變形題。"]);
      }

      const unique = [];
      const seen = new Set();
      reasons.forEach((item) => {
        if (!seen.has(item[0])) {
          seen.add(item[0]);
          unique.push(item);
        }
      });
      if (!unique.length && !isCorrect) unique.push(["method", "選項判斷不穩：下一題會用同主題換一種敘述考你。"]);
      return unique;
    }

    function submitAnswer() {
      if (state.locked) return;
      const question = state.current;
      const selected = selectedLetters();
      if (!selected.length) {
        els.resultBox.textContent = "這題是多選題，至少選一個選項再送出。";
        els.resultBox.className = "result bad";
        els.diagnosisBox.innerHTML = "";
        els.explainList.innerHTML = "";
        els.feedbackPanel.classList.add("show");
        return;
      }

      const correct = question.options.filter((opt) => opt[2]).map((opt) => opt[0]);
      const isCorrect = arraysEqualSet(selected, correct);
      const confidence = getConfidence();
      const mistakeReasons = inferMistakes(question, selected, correct, isCorrect, confidence);
      const reasonKeys = mistakeReasons.map(([key]) => key);
      state.locked = true;
      updateQuestionCounter();
      state.answered += 1;
      state.topicAttempts[question.topic] += 1;
      state.confidenceCounts[confidence] += 1;
      if (isCorrect && confidence === "sure") {
        state.correct += 1;
        state.topicCorrect[question.topic] += 1;
        if (state.weak[question.topic] > 0) state.weak[question.topic] -= 1;
        state.lastWrongTopic = null;
      } else {
        if (isCorrect) state.correct += 1;
        if (isCorrect) state.topicCorrect[question.topic] += 1;
        state.weak[question.topic] += 1;
        state.lastWrongTopic = question.topic;
        state.dueQueue.push(question.topic);
        if (!isCorrect) state.dueQueue.push(question.topic);
      }
      mistakeReasons.forEach(([key]) => { state.mistakes[key] += 1; });
      recordAnswer(question, selected, correct, isCorrect, confidence, reasonKeys);
      if (state.mode === "exam") state.examIndex += 1;

      markOptions(selected);
      renderFeedback(question, selected, correct, isCorrect, confidence, mistakeReasons);
      renderMistakeNotes();
      updateStats();
      saveProgress();
    }

    function recordAnswer(question, selected, correct, isCorrect, confidence, reasonKeys) {
      const entry = {
        at: new Date().toISOString(),
        questionId: question.id,
        topic: question.topic,
        prompt: question.prompt,
        selected,
        correct,
        isCorrect,
        confidence,
        reasons: reasonKeys
      };
      state.answerLog.push(entry);
      if (state.answerLog.length > 200) state.answerLog.shift();

      const needsReview = !isCorrect || confidence !== "sure";
      const existing = state.wrongBook.find((item) => item.questionId === question.id);
      if (needsReview) {
        state.notesDirty = true;
        state.lastReviewQuestionId = question.id;
        const reviewEntry = {
          ...entry,
          attempts: (existing?.attempts || 0) + 1,
          lastMissed: correct.filter((letter) => !selected.includes(letter)),
          lastWrongSelected: selected.filter((letter) => !correct.includes(letter))
        };
        state.wrongBook = state.wrongBook.filter((item) => item.questionId !== question.id);
        state.wrongBook.unshift(reviewEntry);
      } else if (existing) {
        state.wrongBook = state.wrongBook.filter((item) => item.questionId !== question.id);
        if (state.lastReviewQuestionId === question.id) state.lastReviewQuestionId = null;
      }
      state.wrongBook = state.wrongBook.slice(0, 80);
    }

    function markOptions(selected) {
      const question = state.current;
      const labels = [...els.optionsForm.querySelectorAll(".option")];
      labels.forEach((label, index) => {
        const [letter, , answer] = question.options[index];
        const wasSelected = selected.includes(letter);
        const input = label.querySelector("input");
        input.disabled = true;
        if (answer) label.classList.add("correct");
        if (wasSelected && !answer) label.classList.add("incorrect");
      });
    }

    function renderFeedback(question, selected, correct, isCorrect, confidence, mistakeReasons) {
      els.feedbackPanel.classList.add("show");
      const fullyMastered = isCorrect && confidence === "sure";
      els.resultBox.className = `result ${fullyMastered ? "ok" : (isCorrect ? "review" : "bad")}`;
      if (fullyMastered) {
        els.resultBox.textContent = "答對且很確定。這題暫時標為已掌握。";
      } else if (isCorrect) {
        els.resultBox.textContent = `答對了。因為你的把握度不是「很確定」，這題會放進複習清單，系統會再安排「${topics[question.topic]}」變形題確認。`;
      } else {
        els.resultBox.textContent = `答錯了。正確答案是 ${correct.join(", ")}。下一題會優先用「${topics[question.topic]}」換一種方式考你。`;
      }

      if (isCorrect && confidence !== "sure") {
        const confidenceText = confidence === "guess" ? "我是猜的" : "有點懂";
        els.diagnosisBox.style.display = "grid";
        els.diagnosisBox.innerHTML = `
          <strong>低信心答對提醒</strong>
          <ul>
            <li>你選的是「${confidenceText}」，代表這題雖然全對，但目前比較像尚未穩定掌握或可能猜中。</li>
            <li>這題在考：${inferQuestionConcept(question)}</li>
            <li>系統會把它放進複習清單，下一次用同概念換一種問法確認你是真的會。</li>
          </ul>
        `;
      } else if (mistakeReasons.length) {
        els.diagnosisBox.style.display = "grid";
        els.diagnosisBox.innerHTML = `
          <strong>系統判斷的錯因</strong>
          <ul>${mistakeReasons.map(([, text]) => `<li>${text}</li>`).join("")}</ul>
        `;
      } else {
        els.diagnosisBox.style.display = "none";
        els.diagnosisBox.innerHTML = "";
      }

      els.explainList.innerHTML = "";
      const summary = document.createElement("div");
      summary.className = "explain summary";
      summary.innerHTML = `<strong>本題觀念</strong><div>${inferQuestionConcept(question)}</div>`;
      els.explainList.appendChild(summary);
      question.options.forEach(([letter, text, answer, reason]) => {
        const picked = selected.includes(letter);
        const block = document.createElement("div");
        block.className = "explain";
        const status = answer ? "正確敘述" : "錯誤陷阱";
        const pickedText = picked ? "你有選" : (answer ? "你漏選" : "你未選");
        block.innerHTML = `<strong>${letter}. ${status}｜${pickedText}</strong><div>${text}</div><div>${reason}</div>`;
        els.explainList.appendChild(block);
      });

      if (state.mode === "exam" && state.examIndex >= state.examQueue.length) {
        els.nextBtn.textContent = "完成模擬考，回到弱點練習";
      } else {
        els.nextBtn.textContent = fullyMastered ? "繼續練習" : "用同概念換題再練";
      }
    }

    function renderReview() {
      if (!state.current) return;
      const isOpen = els.reviewBox.classList.contains("show");
      if (isOpen) {
        els.reviewBox.classList.remove("show");
        els.reviewBtn.textContent = "看本題觀念表";
        els.reviewBtn.setAttribute("aria-expanded", "false");
        return;
      }

      const topic = state.current.topic;
      const notes = conceptNotes[topic] || [["本題重點", "這題目前沒有獨立觀念表，請先看選項解析。"]];
      const rows = notes.map(([key, note]) => `<tr><th>${key}</th><td>${note}</td></tr>`).join("");
      els.reviewBox.innerHTML = `
        <h2 style="font-size:1.05rem;margin:0;">${topics[topic]} 觀念表</h2>
        <table class="mini-table"><tbody>${rows}</tbody></table>
      `;
      els.reviewBox.classList.add("show");
      els.reviewBtn.textContent = "收起本題觀念表";
      els.reviewBtn.setAttribute("aria-expanded", "true");
      requestAnimationFrame(() => {
        els.reviewBox.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });
    }

    function updateStats() {
      updateQuestionCounter();
      els.answered.textContent = String(state.answered);
      els.accuracy.textContent = state.answered ? `${Math.round((state.correct / state.answered) * 100)}%` : "-";
      els.examProgress.textContent = state.mode === "exam"
        ? `${Math.min(state.examIndex + (state.locked ? 0 : 1), state.examQueue.length || state.examTotal)} / ${state.examQueue.length || state.examTotal}`
        : "-";
      const sorted = Object.entries(state.weak).sort((a, b) => b[1] - a[1]);
      const mistakeSorted = Object.entries(state.mistakes).sort((a, b) => b[1] - a[1]);
      els.weakest.textContent = sorted[0][1] > 0
        ? `${topics[sorted[0][0]]}｜${mistakeSorted[0][1] > 0 ? mistakeLabel[mistakeSorted[0][0]] : "待觀察"}`
        : "尚未累積";
      els.topicList.innerHTML = "";
      Object.entries(topics).forEach(([key, label]) => {
        const row = document.createElement("div");
        row.className = "topic-row";
        const count = state.weak[key];
        row.innerHTML = `<span>${label}</span><strong class="${count ? "weak" : ""}">${count}</strong>`;
        els.topicList.appendChild(row);
      });
      renderDashboard();
    }

    function renderBars(container, rows, emptyText) {
      container.innerHTML = "";
      const max = Math.max(...rows.map((row) => row.value), 1);
      const visible = rows.filter((row) => row.value > 0);
      if (!visible.length) {
        container.innerHTML = `<div class="sync-status">${emptyText}</div>`;
        return;
      }
      visible.forEach((row) => {
        const div = document.createElement("div");
        div.className = "bar-row";
        div.innerHTML = `
          <span>${row.label}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(6, Math.round((row.value / max) * 100))}%"></div></div>
          <strong>${row.value}</strong>
        `;
        container.appendChild(div);
      });
    }

    function shortQuestionTitle(prompt) {
      return prompt
        .replace(/\s*\(More than one correct answer\)/i, "")
        .replace(/^Regarding\s+/i, "")
        .slice(0, 82);
    }

    function inferQuestionConcept(question) {
      if (question.explanation) return question.explanation;
      const topicNote = studyNotes[question.topic];
      if (!topicNote) return "這題重點是判斷每個選項的概念是否符合該單元定義，先看正確選項背後的規則，再看錯誤選項混淆了哪個相近概念。";
      const optionText = question.options.map(([, text]) => text).join(" ").toLowerCase();
      const promptText = question.prompt.toLowerCase();
      if (/training|testing|train\/test|generalize|equally weighted/.test(`${promptText} ${optionText}`)) {
        return "這題在考 training set / testing set 的角色分工與泛化能力。正確流程是先用 training set 找出 portfolio weights 或策略，再把同一組權重套到 testing set 檢查新期間表現。testing set 不能拿來直接挑最佳權重，否則等於偷看答案、會高估策略效果。若 training 最佳化策略在 testing 輸給 equally weighted policy，代表它可能只是在 training period 表現好，泛化到新資料不一定好。";
      }
      if (/accuracy|imbalanced|minority|positive class is rare|all samples as negative/.test(`${promptText} ${optionText}`)) {
        return "這題在考 class imbalance 下 accuracy 的陷阱。Accuracy 是整體答對比例；如果 positive class 很少，模型即使全部預測成 negative，也可能因為大多數樣本本來就是 negative 而得到高 accuracy。這個敘述正確，但它同時代表模型沒有實際抓到 positive：positive recall 會是 0。因此遇到 imbalanced classification，不能只看 accuracy，還要看 recall、precision、confusion matrix、ROC/AUC。";
      }
      if (/biased regression|lasso|ridge|elasticnet|city block|euclidean|l1|l2|penalty/.test(`${promptText} ${optionText}`)) {
        return "這題在考 biased regression / regularization 的核心對應。Biased regression 不是亂偏誤，而是刻意加入 penalty，犧牲一點 bias 換取更穩定、較不容易 overfit 的模型。Lasso 是 L1 penalty，對應 city block / Manhattan distance，常能把係數壓成 0；Ridge 是 L2 penalty，對應 Euclidean distance，重點是縮小係數、穩定模型；ElasticNet 是 L1 + L2 的折衷。";
      }
      const matchedSection = topicNote.sections.find(([title]) => optionText.includes(title.toLowerCase().split(" ")[0]));
      const base = matchedSection
        ? `${matchedSection[0]}：${matchedSection[1]}`
        : `${topicNote.focus} ${topicNote.sections[0][0]}：${topicNote.sections[0][1]}`;
      return `${base} 考試作答時，不要只背選項文字，要先判斷題目是在考定義、模型差異、指標方向，還是參數意義。`;
    }

    function renderMistakeNotes() {
      els.notesRail.classList.toggle("open", state.notesOpen);
      els.notesToggle.textContent = state.notesOpen
        ? "收起錯題筆記"
        : (state.notesDirty ? "打開錯題筆記（已更新）" : "打開錯題筆記");
      els.notesToggle.setAttribute("aria-expanded", String(state.notesOpen));

      if (!state.wrongBook.length) {
        els.mistakeNotesContent.innerHTML = `<div class="sync-status">目前沒有錯題筆記。答錯或低信心答對後，這裡會自動整理成可複習的小抄。</div>`;
        return;
      }

      const recent = state.wrongBook.slice(0, 6);
      const grouped = recent.reduce((acc, item) => {
        const bucket = acc[item.topic] || { topic: item.topic, items: [] };
        bucket.items.push(item);
        acc[item.topic] = bucket;
        return acc;
      }, {});

      els.mistakeNotesContent.innerHTML = Object.values(grouped).map((group) => {
        const note = studyNotes[group.topic];
        const reasonSet = [...new Set(group.items.flatMap((item) => item.reasons || []).map((key) => mistakeLabel[key]))];
        const problemSummary = group.items.map((item) => {
          const missed = item.lastMissed?.length ? `漏選 ${item.lastMissed.join(", ")}` : "";
          const wrong = item.lastWrongSelected?.length ? `誤選 ${item.lastWrongSelected.join(", ")}` : "";
          return [missed, wrong].filter(Boolean).join("、") || (item.isCorrect ? "答對但信心不足" : "選項判斷不穩");
        }).join("；");
        const sections = (note?.sections || conceptNotes[group.topic] || []).map(([title, body]) => `
          <section>
            <h3>${title}</h3>
            <p>${body}</p>
          </section>
        `).join("");
        const latestInGroup = group.items.some((item) => item.questionId === state.lastReviewQuestionId);
        return `
          <article class="note-card">
            <strong>${note?.title || topics[group.topic]}</strong>
            ${latestInGroup ? `<p><b>剛更新：</b>你剛才答對但信心選「我是猜的／有點懂」，或答錯，因此這個主題被放到最上面複習。</p>` : ""}
            <p>${note?.focus || "這個單元需要回到基本定義與方法差異。"} </p>
            <p><b>你目前卡住：</b>${problemSummary || "需要再確認選項判斷"}${reasonSet.length ? `｜${reasonSet.join("、")}` : ""}</p>
            ${sections}
            <p><b>考前提醒：</b>${note?.examTip || "先判斷題目在考哪個概念，再回頭看每個選項是否符合定義。"}</p>
          </article>
        `;
      }).join("");
      if (state.notesDirty) els.mistakeNotesContent.scrollTop = 0;
    }

    function renderDashboard() {
      els.dashAccuracy.textContent = state.answered ? `${Math.round((state.correct / state.answered) * 100)}%` : "-";
      const weakSorted = Object.entries(state.weak).sort((a, b) => b[1] - a[1]);
      els.dashWeakest.textContent = weakSorted[0][1] > 0 ? topics[weakSorted[0][0]] : "尚未累積";
      els.dashWrongCount.textContent = `${state.wrongBook.length} 題`;

      renderBars(
        els.topicBars,
        Object.entries(topics).map(([key, label]) => ({
          label,
          value: state.weak[key]
        })),
        "還沒有弱點資料。先做幾題，這裡會自動長出來。"
      );
      renderBars(
        els.mistakeBars,
        Object.entries(mistakeLabel).map(([key, label]) => ({
          label,
          value: state.mistakes[key]
        })),
        "還沒有錯因資料。答錯或低信心答對後會開始累積。"
      );

      if (!state.wrongBook.length) {
        els.wrongList.innerHTML = `<div class="sync-status">目前沒有需要複習的題目。答錯或低信心答對的題目會自動收進來。</div>`;
        renderMistakeNotes();
        return;
      }
      els.wrongList.innerHTML = "";
      state.wrongBook.slice(0, 8).forEach((item) => {
        const question = questionBank.find((q) => q.id === item.questionId);
        const div = document.createElement("div");
        div.className = "wrong-item";
        div.dataset.questionId = item.questionId;
        const reasonText = item.reasons?.length ? item.reasons.map((key) => mistakeLabel[key]).join("、") : "待觀察";
        const statusText = item.isCorrect ? "答對但低信心" : "答錯";
        const statusClass = item.isCorrect ? "複習確認" : "錯題";
        const summaryHtml = question ? `
          <div class="wrong-summary">
            <strong>本題觀念</strong>
            <div>${inferQuestionConcept(question)}</div>
          </div>
        ` : "";
        const detailHtml = question ? question.options.map(([letter, text, answer, reason]) => {
          const picked = item.selected.includes(letter);
          const choiceClass = answer && picked ? "correct" : (answer ? "missed" : (picked ? "trap" : ""));
          const status = answer ? "正確敘述" : "錯誤陷阱";
          const pickedText = picked ? "你有選" : (answer ? "你漏選" : "你未選");
          return `
            <div class="wrong-choice ${choiceClass}">
              <strong>${letter}. ${status}｜${pickedText}</strong>
              <div>${text}</div>
              <small>${reason}</small>
            </div>
          `;
        }).join("") : `<div class="sync-status">找不到這題的題庫資料，可能是舊版紀錄。請重新作答一次更新。</div>`;
        div.innerHTML = `
          <small>${topics[item.topic]}｜${statusClass}｜${reasonText}｜累積 ${item.attempts || 1} 次</small>
          <strong>${item.prompt}</strong>
          <small>${statusText}｜你選：${item.selected.join(", ") || "-"}｜正解：${item.correct.join(", ")}</small>
          <div class="wrong-actions">
            <button type="button" data-action="toggle-review" data-question-id="${item.questionId}">看詳解</button>
            <button type="button" data-action="retry-question" data-question-id="${item.questionId}">重練這題</button>
          </div>
          <div class="wrong-detail">${summaryHtml}${detailHtml}</div>
        `;
        els.wrongList.appendChild(div);
      });
      renderMistakeNotes();
    }

    function setMode(mode) {
      state.mode = mode;
      updateModeUi();
      if (mode === "exam") startExam();
      renderQuestion(chooseQuestion());
      updateStats();
      saveProgress();
    }

    function updateModeUi() {
      els.adaptiveMode.classList.toggle("active", state.mode === "adaptive");
      els.weakMode.classList.toggle("active", state.mode === "weak");
      els.randomMode.classList.toggle("active", state.mode === "random");
      els.examMode.classList.toggle("active", state.mode === "exam");
      const help = {
        adaptive: "循序練習：照 Chi-square → t-test/ANOVA → Tree → Ensemble → 評估指標 → 專案解讀走，答錯才插入同概念追問。",
        weak: "補弱點：只集中考你目前錯最多、最不穩的概念。",
        random: "隨機刷題：完全打散題目，不照課程順序，也不因答錯而追問，適合測臨場反應。",
        exam: "模擬考：一次 20 題，適合考前測試整體熟練度。"
      };
      els.modeHelp.textContent = help[state.mode];
    }

    function reset() {
      resetCollections();
      state.notesOpen = false;
      state.notesDirty = false;
      state.lastReviewQuestionId = null;
      localStorage.removeItem(STORAGE_KEY);
      updateStats();
      saveProgress();
      renderQuestion(chooseQuestion());
    }

    function toggleMistakeNotes() {
      state.notesOpen = !state.notesOpen;
      if (state.notesOpen) state.notesDirty = false;
      renderMistakeNotes();
      saveProgress();
    }

    function handleWrongListClick(event) {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const questionId = button.dataset.questionId;
      const item = state.wrongBook.find((entry) => entry.questionId === questionId);
      const question = questionBank.find((entry) => entry.id === questionId);
      if (!item || !question) return;

      if (button.dataset.action === "toggle-review") {
        const card = button.closest(".wrong-item");
        const isOpen = card.classList.toggle("open");
        button.textContent = isOpen ? "收起詳解" : "看詳解";
        return;
      }

      if (button.dataset.action === "retry-question") {
        state.mode = "weak";
        updateModeUi();
        renderQuestion(question);
        updateStats();
        saveProgress();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function hydrateFirebaseSettings() {
      els.storagePill.textContent = "可登入";
      els.syncStatus.textContent = "可用本機保存；登入 Google 後可跨裝置同步。";
    }

    window.getPracticeSnapshot = getPersistableState;
    window.getStoredPracticeSnapshot = () => safeParseJson(localStorage.getItem(STORAGE_KEY));
    window.applyCloudSnapshot = (snapshot) => {
      applySnapshot(snapshot);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(getPersistableState()));
      updateModeUi();
      updateStats();
      renderQuestion(chooseQuestion());
    };
    window.setSyncUi = ({ status, pill, buttonText } = {}) => {
      if (status) els.syncStatus.textContent = status;
      if (pill) els.storagePill.textContent = pill;
      if (buttonText) els.googleBtn.textContent = buttonText;
    };

    els.submitBtn.addEventListener("click", submitAnswer);
    els.skipBtn.addEventListener("click", () => {
      renderQuestion(chooseQuestion());
      saveProgress();
    });
    els.nextBtn.addEventListener("click", () => {
      if (state.mode === "exam" && state.examIndex >= state.examQueue.length) {
        setMode("weak");
        return;
      }
      renderQuestion(chooseQuestion());
      updateStats();
    });
    els.reviewBtn.addEventListener("click", renderReview);
    els.wrongList.addEventListener("click", handleWrongListClick);
    els.notesToggle.addEventListener("click", toggleMistakeNotes);
    els.adaptiveMode.addEventListener("click", () => setMode("adaptive"));
    els.weakMode.addEventListener("click", () => setMode("weak"));
    els.randomMode.addEventListener("click", () => setMode("random"));
    els.examMode.addEventListener("click", () => setMode("exam"));
    els.resetBtn.addEventListener("click", reset);
    els.googleBtn.addEventListener("click", () => {
      if (window.startGoogleSignIn) {
        window.startGoogleSignIn();
        return;
      }
      els.syncStatus.textContent = "Google 登入正在初始化，請等幾秒後再按一次。";
    });

    loadLocalProgress();
    hydrateFirebaseSettings();
    updateModeUi();
    updateStats();
    renderQuestion(chooseQuestion());
  </script>
  <script type="module">
    const config = window.DSDS_FIREBASE_CONFIG;
    const hasConfig = !!(config?.apiKey && config?.authDomain && config?.projectId && config?.appId);

    if (hasConfig) {
      try {
        const [{ initializeApp }, authLib, firestoreLib] = await Promise.all([
          import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js"),
          import("https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js"),
          import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js")
        ]);
        const {
          getAuth,
          GoogleAuthProvider,
          signInWithPopup,
          signInWithRedirect,
          getRedirectResult,
          signOut,
          onAuthStateChanged
        } = authLib;
        const { getFirestore, doc, getDoc, setDoc } = firestoreLib;
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let currentUser = null;
        let cloudReady = false;

        function progressRef(user) {
          return doc(db, "users", user.uid, "dsdsFinalPractice", "progress");
        }

        function describeAuthError(error) {
          const code = error?.code || "unknown";
          const messages = {
            "auth/unauthorized-domain": "這個網域尚未加入 Firebase Authorized domains。請到 Authentication > Settings > Authorized domains 加入 yvonne96073.github.io。",
            "auth/configuration-not-found": "Firebase Authentication 尚未完成設定。請到 Firebase > Authentication 按 Get started，並在 Sign-in method 啟用 Google 登入。",
            "auth/operation-not-allowed": "Firebase Authentication 尚未啟用 Google 登入。請到 Authentication > Sign-in method 開啟 Google。",
            "auth/popup-blocked": "瀏覽器擋住彈出視窗。我會改用重新導向登入。",
            "auth/popup-closed-by-user": "登入視窗被關閉或被瀏覽器中斷。請再按一次，或改用重新導向登入。",
            "auth/cancelled-popup-request": "上一個登入視窗還沒完成就開了新的。請等幾秒再按一次。",
            "auth/network-request-failed": "網路連線失敗，請確認可以連到 Firebase/Google。"
          };
          return `${messages[code] || "Google 登入失敗，請檢查 Firebase Authentication 與 Authorized domains 設定。"}（${code}）`;
        }

        window.startGoogleSignIn = async () => {
          if (currentUser) return signOut(auth);
          window.setSyncUi?.({ status: "正在開啟 Google 登入視窗..." });
          try {
            await signInWithPopup(auth, provider);
          } catch (error) {
            const message = describeAuthError(error);
            window.setSyncUi?.({ pill: "登入失敗", status: message });
            if (["auth/popup-blocked", "auth/popup-closed-by-user"].includes(error?.code)) {
              window.setSyncUi?.({ status: `${message} 3 秒後改用整頁重新導向登入。` });
              setTimeout(() => signInWithRedirect(auth, provider), 3000);
            }
          }
        };

        window.saveCloudProgress = async (snapshot) => {
          if (!currentUser || !cloudReady) return;
          await setDoc(progressRef(currentUser), {
            ...snapshot,
            uid: currentUser.uid,
            email: currentUser.email || null
          }, { merge: true });
        };

        getRedirectResult(auth).catch((error) => {
          window.setSyncUi?.({ pill: "登入失敗", status: describeAuthError(error) });
        });

        onAuthStateChanged(auth, async (user) => {
          currentUser = user;
          if (!user) {
            cloudReady = false;
            window.setSyncUi?.({
              pill: "可登入",
              buttonText: "Google 登入",
              status: "已儲存 Firebase 設定；登入後可跨裝置同步。"
            });
            return;
          }

          window.setSyncUi?.({
            pill: "雲端",
            buttonText: "登出",
            status: `已登入 ${user.displayName || user.email || "Google 帳號"}，正在同步學習紀錄。`
          });

          const ref = progressRef(user);
          const cloudDoc = await getDoc(ref);
          const localSnapshot = window.getStoredPracticeSnapshot?.() || window.getPracticeSnapshot?.();
          if (cloudDoc.exists()) {
            const cloudSnapshot = cloudDoc.data();
            const cloudTime = Date.parse(cloudSnapshot.savedAt || 0);
            const localTime = Date.parse(localSnapshot?.savedAt || 0);
            if (cloudTime > localTime) {
              window.applyCloudSnapshot?.(cloudSnapshot);
            } else if (localSnapshot) {
              await setDoc(ref, { ...localSnapshot, uid: user.uid, email: user.email || null }, { merge: true });
            }
          } else if (localSnapshot) {
            await setDoc(ref, { ...localSnapshot, uid: user.uid, email: user.email || null }, { merge: true });
          }
          cloudReady = true;
          window.setSyncUi?.({
            pill: "雲端",
            buttonText: "登出",
            status: "Google 雲端同步已啟用；本機與雲端會一起保存。"
          });
        });
      } catch (error) {
        window.setSyncUi?.({
          pill: "本機",
          status: `Google 同步初始化失敗，目前使用本機保存。錯誤：${error.message}`
        });
      }
    }
  </script>
</body>
