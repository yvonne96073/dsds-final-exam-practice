<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>資料科學期末互動練習</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #1d252d;
      --muted: #65717f;
      --line: #d8dee6;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --accent: #b45309;
      --danger: #b91c1c;
      --danger-bg: #fff1f2;
      --ok: #15803d;
      --ok-bg: #ecfdf3;
      --focus: #2563eb;
      --shadow: 0 18px 45px rgba(20, 34, 51, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, #eef7f6 0, #f6f7f9 260px),
        var(--bg);
      font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      line-height: 1.55;
    }

    button, input { font: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(230px, 300px) minmax(0, 1fr);
    }

    aside {
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, .82);
      padding: 28px 22px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    main {
      padding: 32px;
      display: grid;
      align-content: start;
      gap: 22px;
    }

    .brand {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }

    .brand h1 {
      font-size: 1.35rem;
      line-height: 1.25;
      margin: 0;
      letter-spacing: 0;
    }

    .brand p {
      color: var(--muted);
      margin: 0;
      font-size: .94rem;
    }

    .stats {
      display: grid;
      gap: 10px;
      margin: 22px 0;
    }

    .account {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      margin: 18px 0;
    }

    .account-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-weight: 800;
    }

    .sync-status {
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.45;
    }

    .account-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .stat span:first-child {
      color: var(--muted);
      font-size: .9rem;
    }

    .stat strong {
      font-size: 1.05rem;
    }

    .topic-list {
      display: grid;
      gap: 8px;
    }

    .topic-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: .88rem;
      color: var(--muted);
      padding: 8px 0;
      border-bottom: 1px solid #edf0f3;
    }

    .weak {
      color: var(--danger);
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      max-width: 980px;
    }

    .mode-area {
      display: grid;
      gap: 8px;
    }

    .mode-help {
      color: var(--muted);
      font-size: .9rem;
    }

    .mode-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .seg {
      border: 1px solid var(--line);
      color: var(--ink);
      background: #fff;
      min-height: 40px;
      padding: 8px 13px;
      border-radius: 8px;
      cursor: pointer;
    }

    .seg.active {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    .panel {
      max-width: 980px;
      background: var(--panel);
      border: 1px solid rgba(216, 222, 230, .9);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .question {
      padding: 28px;
      display: grid;
      gap: 20px;
    }

    .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: .92rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 10px;
      background: #eef7f6;
      color: var(--brand-dark);
      font-weight: 700;
      font-size: .82rem;
    }

    .question h2 {
      font-size: clamp(1.15rem, 1.7vw, 1.55rem);
      margin: 0;
      line-height: 1.45;
      letter-spacing: 0;
    }

    .confidence {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #f9fbfc;
    }

    .confidence strong {
      font-size: .94rem;
    }

    .confidence-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .confidence label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 10px;
      background: #fff;
      cursor: pointer;
    }

    .confidence input {
      accent-color: var(--brand);
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      background: #fff;
      cursor: pointer;
      min-height: 58px;
      align-items: start;
    }

    .option:hover {
      border-color: #a9b5c3;
      background: #fbfcfd;
    }

    .option input {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: var(--brand);
    }

    .option.correct {
      border-color: #86efac;
      background: var(--ok-bg);
    }

    .option.incorrect {
      border-color: #fecdd3;
      background: var(--danger-bg);
    }

    .letter {
      font-weight: 800;
      color: var(--brand-dark);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 800;
    }

    .primary {
      background: var(--brand);
      color: #fff;
    }

    .primary:hover { background: var(--brand-dark); }

    .secondary {
      background: #e8edf2;
      color: var(--ink);
    }

    .secondary:hover { background: #dce3ea; }

    .ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink);
    }

    .feedback {
      border-top: 1px solid var(--line);
      padding: 0 28px 28px;
      display: none;
    }

    .feedback.show {
      display: grid;
      gap: 14px;
    }

    .result {
      border-radius: 8px;
      padding: 14px;
      font-weight: 800;
    }

    .result.ok {
      background: var(--ok-bg);
      color: var(--ok);
    }

    .result.bad {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .explain-list {
      display: grid;
      gap: 10px;
    }

    .explain {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .explain strong { display: block; margin-bottom: 4px; }

    .review-box {
      max-width: 980px;
      padding: 20px;
      display: none;
    }

    .review-box.show {
      display: grid;
      gap: 12px;
    }

    .dashboard {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .dashboard h2 {
      margin: 0;
      font-size: 1.15rem;
    }

    .dash-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .dash-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
      display: grid;
      gap: 6px;
      min-height: 92px;
    }

    .dash-card span {
      color: var(--muted);
      font-size: .88rem;
    }

    .dash-card strong {
      font-size: 1.35rem;
      line-height: 1.2;
    }

    .bars {
      display: grid;
      gap: 10px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(130px, 210px) 1fr auto;
      gap: 10px;
      align-items: center;
      font-size: .9rem;
    }

    .bar-track {
      height: 10px;
      background: #edf0f3;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--brand);
      border-radius: inherit;
    }

    .wrong-list {
      display: grid;
      gap: 10px;
    }

    .wrong-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 5px;
    }

    .wrong-item small {
      color: var(--muted);
    }

    .settings {
      display: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #f9fbfc;
      gap: 10px;
    }

    .settings.show {
      display: grid;
    }

    .settings textarea {
      width: 100%;
      min-height: 96px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      resize: vertical;
      font-family: Consolas, monospace;
      font-size: .86rem;
    }

    .diagnosis {
      display: grid;
      gap: 8px;
      border: 1px solid #fed7aa;
      background: #fff7ed;
      border-radius: 8px;
      padding: 12px;
      color: #7c2d12;
    }

    .diagnosis ul {
      margin: 0;
      padding-left: 20px;
    }

    .mini-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .95rem;
      overflow-wrap: anywhere;
    }

    .mini-table th,
    .mini-table td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 10px 8px;
      vertical-align: top;
    }

    @media (max-width: 780px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        padding: 18px;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .dash-grid {
        grid-template-columns: 1fr;
      }

      .bar-row {
        grid-template-columns: 1fr;
      }

      .question,
      .feedback {
        padding-left: 18px;
        padding-right: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <section class="brand">
        <h1>資料科學期末互動練習</h1>
        <p>多選題模式。答錯後會追問同概念的變形題。</p>
      </section>

      <section class="stats" aria-label="練習統計">
        <div class="stat"><span>已作答</span><strong id="answered">0</strong></div>
        <div class="stat"><span>正確率</span><strong id="accuracy">-</strong></div>
        <div class="stat"><span>模擬考進度</span><strong id="examProgress">-</strong></div>
        <div class="stat"><span>目前弱點</span><strong id="weakest">尚未累積</strong></div>
      </section>

      <section class="account" aria-label="帳號與同步">
        <div class="account-title">
          <span>資料保存</span>
          <span class="pill" id="storagePill">本機</span>
        </div>
        <div class="sync-status" id="syncStatus">已啟用本機保存；重新整理不會消失。</div>
        <div class="account-actions">
          <button class="btn secondary" id="googleBtn" type="button">Google 登入</button>
          <button class="btn ghost" id="syncSettingsBtn" type="button">同步設定</button>
        </div>
        <div class="settings" id="syncSettings">
          <strong>Firebase 設定 JSON</strong>
          <textarea id="firebaseConfigInput" placeholder='可以貼整段 const firebaseConfig = { ... }，或只貼 { ... }'></textarea>
          <div class="actions">
            <button class="btn secondary" id="saveFirebaseBtn" type="button">儲存設定</button>
            <button class="btn ghost" id="clearFirebaseBtn" type="button">清除設定</button>
          </div>
          <div class="sync-status">Google 登入需要 Firebase 專案，並在 Auth 加入 yvonne96073.github.io 授權網域。</div>
        </div>
      </section>

      <section>
        <h2 style="font-size:1rem;margin:0 0 10px;">概念弱點</h2>
        <div class="topic-list" id="topicList"></div>
      </section>
    </aside>

    <main>
      <div class="toolbar">
        <div class="mode-area">
          <div class="mode-group" aria-label="練習模式">
            <button class="seg active" id="adaptiveMode" type="button">循序練習</button>
            <button class="seg" id="weakMode" type="button">補弱點</button>
            <button class="seg" id="randomMode" type="button">隨機刷題</button>
            <button class="seg" id="examMode" type="button">模擬考</button>
          </div>
          <div class="mode-help" id="modeHelp">循序練習：照課程順序複習，答錯才插入同概念追問。</div>
        </div>
        <button class="btn ghost" id="resetBtn" type="button">重新開始</button>
      </div>

      <section class="panel question" id="questionPanel">
        <div class="meta">
          <span class="pill" id="topicPill">Topic</span>
          <span id="sourceText"></span>
        </div>
        <h2 id="questionText"></h2>
        <form class="options" id="optionsForm"></form>
        <div class="confidence" id="confidencePanel">
          <strong>這題你的把握度？</strong>
          <div class="confidence-row">
            <label><input type="radio" name="confidence" value="guess" /> 我是猜的</label>
            <label><input type="radio" name="confidence" value="partial" checked /> 有點懂</label>
            <label><input type="radio" name="confidence" value="sure" /> 很確定</label>
          </div>
        </div>
        <div class="actions">
          <button class="btn primary" id="submitBtn" type="button">送出答案</button>
          <button class="btn secondary" id="skipBtn" type="button">跳過這題</button>
        </div>
      </section>

      <section class="panel feedback" id="feedbackPanel">
        <div class="result" id="resultBox"></div>
        <div class="diagnosis" id="diagnosisBox"></div>
        <div class="explain-list" id="explainList"></div>
        <div class="actions">
          <button class="btn primary" id="nextBtn" type="button">繼續練習</button>
          <button class="btn secondary" id="reviewBtn" type="button">看本題觀念表</button>
        </div>
      </section>

      <section class="panel dashboard" id="dashboardPanel">
        <h2>錯題分析 Dashboard</h2>
        <div class="dash-grid">
          <div class="dash-card"><span>累積正確率</span><strong id="dashAccuracy">-</strong></div>
          <div class="dash-card"><span>最需要補強</span><strong id="dashWeakest">尚未累積</strong></div>
          <div class="dash-card"><span>錯題本</span><strong id="dashWrongCount">0 題</strong></div>
        </div>
        <div>
          <h2>單元弱點</h2>
          <div class="bars" id="topicBars"></div>
        </div>
        <div>
          <h2>常見錯因</h2>
          <div class="bars" id="mistakeBars"></div>
        </div>
        <div>
          <h2>錯題本</h2>
          <div class="wrong-list" id="wrongList"></div>
        </div>
      </section>

      <section class="panel review-box" id="reviewBox"></section>
    </main>
  </div>

  <script>
    const topics = {
      chi: "Chi-square / p-value",
      stat: "t-test / ANOVA",
      tree: "Decision Tree",
      ensemble: "Ensemble",
      eval: "Recall / Precision / ROC",
      project: "Feature Importance"
    };

    const topicOrder = ["chi", "stat", "tree", "ensemble", "eval", "project"];
    const STORAGE_KEY = "dsdsFinalPracticeProgressV2";
    const FIREBASE_CONFIG_KEY = "dsdsFinalPracticeFirebaseConfig";
    const APP_VERSION = 2;
    const mistakeLabel = {
      formula: "公式/低信心",
      direction: "方向判斷",
      method: "方法選擇",
      model: "模型差異",
      metric: "指標混淆",
      causality: "因果陷阱"
    };

    const conceptNotes = {
      chi: [
        ["Chi-square", "用於兩個類別變數是否 independent / dependent。"],
        ["H0", "通常是兩個類別變數 independent。"],
        ["p-value", "小於 alpha 時拒絕 H0；不是 H0 為真的機率，也不能推出因果。"]
      ],
      stat: [
        ["t-test", "比較兩組平均數。"],
        ["F-test", "比較變異數。"],
        ["ANOVA", "比較三組以上平均數；Two-way ANOVA 可看兩個 factors 和 interaction。"]
      ],
      tree: [
        ["Decision Tree", "透過 recursive splitting，把資料切得更純。"],
        ["C5.0", "以 Entropy / Information Gain / Gain Ratio 為核心。"],
        ["CART", "以 Gini impurity 為核心。"]
      ],
      ensemble: [
        ["Bagging", "平行訓練多個模型，常用 bootstrap samples，降低 variance。"],
        ["Random Forest", "Bagging + random feature selection + 多棵樹投票。"],
        ["Boosting", "序列式訓練，後面的模型修正前面的錯。"]
      ],
      eval: [
        ["Recall", "TP / (TP + FN)，重點是抓到真正 positive。"],
        ["Precision", "TP / (TP + FP)，重點是預測 positive 的準確性。"],
        ["ROC / AUC", "ROC 看不同 threshold；AUC 越大通常越好。"]
      ],
      project: [
        ["Feature importance", "找出影響模型判斷的重要 input features，但不等於因果。"],
        ["Overfitting", "Training 好但 testing 差，表示模型可能背訓練資料。"],
        ["Final project", "不能只報 accuracy，要解釋指標、過度配適與重要變數。"]
      ]
    };

    const questionBank = [
      {
        id: "chi-1",
        topic: "chi",
        source: "DS5_statistics.pdf",
        prompt: "Regarding Chi-square test, which descriptions are correct? More than one correct answer.",
        options: [
          ["A", "It is suitable for judging the relationship between two categorical variables.", true, "Chi-square test 的核心就是 categorical vs categorical。"],
          ["B", "Its null hypothesis usually states that the two variables are independent.", true, "H0 通常是假設兩個類別變數 independent。"],
          ["C", "It compares observed counts with expected counts.", true, "卡方檢定就是看 observed count 和 expected count 差多少。"],
          ["D", "It is mainly used to compare the means of two groups.", false, "比較兩組平均數是 t-test，不是 Chi-square。"],
          ["E", "A small p-value suggests that the two variables may be dependent.", true, "p-value 小表示拒絕 independent 的 H0，傾向認為有關。"]
        ]
      },
      {
        id: "chi-2",
        topic: "chi",
        source: "DS5_statistics.pdf",
        prompt: "If the p-value of a Chi-square test is 0.01 and alpha is 0.05, which descriptions are correct?",
        options: [
          ["A", "We reject H0.", true, "0.01 < 0.05，所以拒絕 H0。"],
          ["B", "The result suggests the variables may be associated.", true, "拒絕 independent 的 H0，表示可能有關聯。"],
          ["C", "The p-value means the probability that H0 is true is 0.01.", false, "p-value 不是 H0 為真的機率。"],
          ["D", "The observed counts are sufficiently different from expected counts.", true, "p-value 小通常表示 observed 和 expected 差距不太像隨機造成。"],
          ["E", "The test proves causality between the variables.", false, "統計關聯不等於因果。"]
        ]
      },
      {
        id: "chi-3",
        topic: "chi",
        source: "DS5_statistics.pdf",
        prompt: "Which situations are suitable for Chi-square test? More than one correct answer.",
        options: [
          ["A", "Gender vs purchase decision.", true, "性別和是否購買都是類別變數。"],
          ["B", "Membership level vs renewal decision.", true, "會員等級與是否續約都是類別變數。"],
          ["C", "Average income between two regions.", false, "平均收入是數值平均數，比較兩組通常是 t-test。"],
          ["D", "Product category vs preferred payment method.", true, "產品類別和付款方式都是類別。"],
          ["E", "Three materials and average productivity.", false, "三組以上平均數比較是 ANOVA。"]
        ]
      },
      {
        id: "stat-1",
        topic: "stat",
        source: "DS5_statistics.pdf",
        prompt: "Regarding t-test and F-test, which descriptions are correct?",
        options: [
          ["A", "t-test can compare the means of two groups.", true, "t-test 的典型用途是比較兩組平均數。"],
          ["B", "F-test can compare variances.", true, "F-test 常用來比較變異數。"],
          ["C", "F-test is mainly used to compare two proportions.", false, "比例比較是 proportion test。"],
          ["D", "Different variances may affect the t-test procedure.", true, "變異數是否相等會影響 t-test 選用版本。"],
          ["E", "t-test is mainly used for categorical response variables.", false, "t-test 的 response 通常是數值。"]
        ]
      },
      {
        id: "stat-2",
        topic: "stat",
        source: "DS5_statistics.pdf",
        prompt: "Regarding ANOVA, which descriptions are correct?",

    function safeParseJson(text, fallback = null) {
      try {
        return JSON.parse(text);
      } catch {
        return fallback;
      }
    }

    function parseFirebaseConfigInput(text) {
      const raw = (text || "").trim();
      if (!raw) return null;
      const direct = safeParseJson(raw);
      if (direct?.apiKey) return direct;

      const withoutComments = raw
        .replace(/\/\/.*$/gm, "")
        .replace(/\/\*[\s\S]*?\*\//g, "");

      const candidates = [];
      const configIndex = withoutComments.search(/firebaseConfig\s*=/);
      if (configIndex >= 0) {
        const braceStart = withoutComments.indexOf("{", configIndex);
        const extracted = extractObjectLiteral(withoutComments, braceStart);
        if (extracted) candidates.push(extracted);
      }

      for (let i = 0; i < withoutComments.length; i++) {
        if (withoutComments[i] === "{") {
          const extracted = extractObjectLiteral(withoutComments, i);
          if (extracted) candidates.push(extracted);
        }
      }

      for (const candidate of candidates) {
        const config = parseLooseObject(candidate);
        if (config?.apiKey && config?.authDomain && config?.projectId && config?.appId) return config;
      }
      return parseFirebaseKeyValueLines(withoutComments);
    }

    function extractObjectLiteral(text, start) {
      if (start < 0 || text[start] !== "{") return null;
      let depth = 0;
      let quote = null;
      let escaped = false;
      for (let i = start; i < text.length; i++) {
        const char = text[i];
        if (quote) {
          if (escaped) {
            escaped = false;
          } else if (char === "\\") {
            escaped = true;
          } else if (char === quote) {
            quote = null;
          }
          continue;
        }
        if (char === '"' || char === "'") {
          quote = char;
        } else if (char === "{") {
          depth += 1;
        } else if (char === "}") {
          depth -= 1;
          if (depth === 0) return text.slice(start, i + 1);
        }
      }
      return null;
    }

    function parseLooseObject(objectText) {
      const normalized = objectText
        .replace(/(['"])?([A-Za-z_$][\w$]*)\1\s*:/g, '"$2":')
        .replace(/'/g, '"')
        .replace(/,\s*}/g, "}");
      return safeParseJson(normalized);
    }

    function parseFirebaseKeyValueLines(text) {
      const keys = ["apiKey", "authDomain", "projectId", "storageBucket", "messagingSenderId", "appId"];
      const config = {};
      keys.forEach((key) => {
        const pattern = new RegExp(`${key}\\s*:\\s*["']([^"']+)["']`);
        const match = text.match(pattern);
        if (match) config[key] = match[1];
      });
      return config.apiKey && config.authDomain && config.projectId && config.appId ? config : null;
    }

      state.history = Array.isArray(snapshot.history) ? snapshot.history : [];

      Object.keys(topics).forEach((key) => {
        state.weak[key] = Number(snapshot.weak?.[key]) || 0;
        state.topicAttempts[key] = Number(snapshot.topicAttempts?.[key]) || 0;
        state.topicCorrect[key] = Number(snapshot.topicCorrect?.[key]) || 0;
      });
      Object.keys(state.mistakes).forEach((key) => {

      Object.keys(state.confidenceCounts).forEach((key) => {

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function chooseQuestion() {
      if (state.mode === "exam") {
        if (!state.examQueue.length || state.examIndex >= state.examQueue.length) startExam();
        return state.examQueue[state.examIndex];
      }

      if (state.dueQueue.length && state.mode === "adaptive") {
        const target = state.dueQueue.shift();
        const candidates = questionBank.filter((q) => q.topic === target && !state.history.slice(-3).includes(q.id));
        if (candidates.length) return candidates[Math.floor(Math.random() * candidates.length)];
      }

      const recent = new Set(state.history.slice(-5));
      let pool = questionBank.filter((q) => !recent.has(q.id));

      if (pool.length === 0) pool = [...questionBank];

      if (state.mode === "weak") {
        const weakOnly = Object.entries(state.weak)
          .filter(([, count]) => count > 0)
          .map(([topic]) => topic);
        const targeted = pool.filter((q) => weakOnly.includes(q.topic));
        if (targeted.length) return targeted[Math.floor(Math.random() * targeted.length)];
      }

      if (state.mode === "adaptive") {
        for (let i = 0; i < topicOrder.length; i++) {
          const target = topicOrder[state.studyCursor % topicOrder.length];
          state.studyCursor += 1;
          const targeted = pool.filter((q) => q.topic === target);
          if (targeted.length) return targeted[Math.floor(Math.random() * targeted.length)];
        }
      }

      return pool[Math.floor(Math.random() * pool.length)];
    }

    function startExam() {
      state.examQueue = shuffle(questionBank).slice(0, Math.min(state.examTotal, questionBank.length));
      state.examIndex = 0;
    }

    function renderQuestion(question) {
      state.current = question;
      state.locked = false;
      state.history.push(question.id);
      els.topicPill.textContent = topics[question.topic];
      els.sourceText.textContent = question.source;
      els.questionText.textContent = question.prompt;
      els.optionsForm.innerHTML = "";
      els.feedbackPanel.classList.remove("show");
      els.reviewBox.classList.remove("show");
      els.submitBtn.disabled = false;
      els.confidencePanel.querySelector('input[value="partial"]').checked = true;

      question.options.forEach(([letter, text]) => {
        const label = document.createElement("label");
        label.className = "option";
        label.innerHTML = `
          <input type="checkbox" name="answer" value="${letter}" />
          <span><span class="letter">${letter}.</span> ${text}</span>
        `;
        els.optionsForm.appendChild(label);
      });
    }

    function selectedLetters() {
      return [...els.optionsForm.querySelectorAll("input:checked")].map((input) => input.value);
    }

    function arraysEqualSet(a, b) {
      if (a.length !== b.length) return false;
      const set = new Set(a);
      return b.every((item) => set.has(item));
    }

    function getConfidence() {
      return els.confidencePanel.querySelector("input[name='confidence']:checked")?.value || "partial";
    }

    function inferMistakes(question, selected, correct, isCorrect, confidence) {
      const selectedWrong = question.options.filter(([letter, , answer]) => selected.includes(letter) && !answer);
      const missedCorrect = question.options.filter(([letter, , answer]) => correct.includes(letter) && !selected.includes(letter) && answer);
      const text = [...selectedWrong, ...missedCorrect].map((opt) => opt[1]).join(" ").toLowerCase();
      const reasons = [];

      if (isCorrect && confidence === "sure") return reasons;

      if (/tp|fp|fn|recall|precision|threshold|auc|roc|accuracy/.test(text) || question.topic === "eval") {
        reasons.push(["metric", "分類評估指標混淆：特別注意 Recall 的分母是 TP+FN，Precision 的分母是 TP+FP。"]);
      }
      if (/p-value|alpha|reject|h0|independent|larger|smaller|low|high|greater|less/.test(text) || question.topic === "chi") {
        reasons.push(["direction", "方向判斷需要加強：p-value 小才拒絕 H0；impurity 越低越純；AUC 越大通常越好。"]);
      }
      if (/t-test|anova|chi-square|proportion|f-test|categorical|mean|variance/.test(text) || question.topic === "stat") {
        reasons.push(["method", "方法選擇混淆：Chi-square 看類別對類別；t-test 看兩組平均；ANOVA 看三組以上平均。"]);
      }
      if (/c5|cart|gini|entropy|bagging|boosting|random forest|tree/.test(text) || question.topic === "tree" || question.topic === "ensemble") {
        reasons.push(["model", "模型差異混淆：C5.0 對 entropy，CART 對 Gini；Bagging 平行，Boosting 序列修錯。"]);
      }
      if (/causality|causal|definitely/.test(text) || question.topic === "project") {
        reasons.push(["causality", "因果推論陷阱：feature importance 或統計關聯不等於因果。"]);
      }
      if (confidence === "guess") {
        reasons.push(["formula", "低信心答對/答錯都要複習：這題目前比較像猜中，系統會安排變形題。"]);
      }

      const unique = [];
      const seen = new Set();
      reasons.forEach((item) => {
        if (!seen.has(item[0])) {
          seen.add(item[0]);
          unique.push(item);
        }
      });
      if (!unique.length && !isCorrect) unique.push(["method", "選項判斷不穩：下一題會用同主題換一種敘述考你。"]);
      return unique;
    }

    function submitAnswer() {
      if (state.locked) return;
      const question = state.current;
      const selected = selectedLetters();
      if (!selected.length) {
        els.resultBox.textContent = "這題是多選題，至少選一個選項再送出。";
        els.resultBox.className = "result bad";
        els.diagnosisBox.innerHTML = "";
        els.explainList.innerHTML = "";
        els.feedbackPanel.classList.add("show");
        return;
      }

      const correct = question.options.filter((opt) => opt[2]).map((opt) => opt[0]);
      const isCorrect = arraysEqualSet(selected, correct);
      const confidence = getConfidence();
      const mistakeReasons = inferMistakes(question, selected, correct, isCorrect, confidence);
      const reasonKeys = mistakeReasons.map(([key]) => key);
      state.locked = true;
      state.answered += 1;
      state.topicAttempts[question.topic] += 1;
      state.confidenceCounts[confidence] += 1;
      if (isCorrect && confidence === "sure") {
        state.correct += 1;
        state.topicCorrect[question.topic] += 1;
        if (state.weak[question.topic] > 0) state.weak[question.topic] -= 1;
        state.lastWrongTopic = null;
      } else {
        if (isCorrect) state.correct += 1;
        if (isCorrect) state.topicCorrect[question.topic] += 1;
        state.weak[question.topic] += 1;
        state.lastWrongTopic = question.topic;
        state.dueQueue.push(question.topic);
        if (!isCorrect) state.dueQueue.push(question.topic);
      }
      mistakeReasons.forEach(([key]) => { state.mistakes[key] += 1; });
      recordAnswer(question, selected, correct, isCorrect, confidence, reasonKeys);
      if (state.mode === "exam") state.examIndex += 1;

      markOptions(selected);
      renderFeedback(question, selected, correct, isCorrect, confidence, mistakeReasons);
      updateStats();
      saveProgress();
    }

    function recordAnswer(question, selected, correct, isCorrect, confidence, reasonKeys) {
      const entry = {
        at: new Date().toISOString(),
        questionId: question.id,
        topic: question.topic,
        prompt: question.prompt,
        selected,
        correct,
        isCorrect,
        confidence,
        reasons: reasonKeys
      };
      state.answerLog.push(entry);
      if (state.answerLog.length > 200) state.answerLog.shift();

      const needsReview = !isCorrect || confidence !== "sure";
      const existing = state.wrongBook.find((item) => item.questionId === question.id);
      if (needsReview) {
        const reviewEntry = {
          ...entry,
          attempts: (existing?.attempts || 0) + 1,
          lastMissed: correct.filter((letter) => !selected.includes(letter)),
          lastWrongSelected: selected.filter((letter) => !correct.includes(letter))
        };
        if (existing) Object.assign(existing, reviewEntry);
        else state.wrongBook.unshift(reviewEntry);
      } else if (existing) {
        state.wrongBook = state.wrongBook.filter((item) => item.questionId !== question.id);
      }
      state.wrongBook = state.wrongBook.slice(0, 80);
    }

    function markOptions(selected) {
      const question = state.current;
      const labels = [...els.optionsForm.querySelectorAll(".option")];
      labels.forEach((label, index) => {
        const [letter, , answer] = question.options[index];
        const wasSelected = selected.includes(letter);
        const input = label.querySelector("input");
        input.disabled = true;
        if (answer) label.classList.add("correct");
        if (wasSelected && !answer) label.classList.add("incorrect");
      });
    }

    function renderFeedback(question, selected, correct, isCorrect, confidence, mistakeReasons) {
      els.feedbackPanel.classList.add("show");
      const fullyMastered = isCorrect && confidence === "sure";
      els.resultBox.className = `result ${fullyMastered ? "ok" : "bad"}`;
      if (fullyMastered) {
        els.resultBox.textContent = "答對且很確定。這題暫時標為已掌握。";
      } else if (isCorrect) {
        els.resultBox.textContent = `答對了，但你的把握度不是「很確定」。系統會再安排「${topics[question.topic]}」變形題確認。`;
      } else {
        els.resultBox.textContent = `答錯了。正確答案是 ${correct.join(", ")}。下一題會優先用「${topics[question.topic]}」換一種方式考你。`;
      }

      if (mistakeReasons.length) {
        els.diagnosisBox.style.display = "grid";
        els.diagnosisBox.innerHTML = `
          <strong>系統判斷的錯因</strong>
          <ul>${mistakeReasons.map(([, text]) => `<li>${text}</li>`).join("")}</ul>
        `;
      } else {
        els.diagnosisBox.style.display = "none";
        els.diagnosisBox.innerHTML = "";
      }

      els.explainList.innerHTML = "";
      question.options.forEach(([letter, text, answer, reason]) => {
        const picked = selected.includes(letter);
        const block = document.createElement("div");
        block.className = "explain";
        const status = answer ? "正確敘述" : "錯誤陷阱";
        const pickedText = picked ? "你有選" : (answer ? "你漏選" : "你未選");
        block.innerHTML = `<strong>${letter}. ${status}｜${pickedText}</strong><div>${text}</div><div>${reason}</div>`;
        els.explainList.appendChild(block);
      });

      if (state.mode === "exam" && state.examIndex >= state.examQueue.length) {
        els.nextBtn.textContent = "完成模擬考，回到弱點練習";
      } else {
        els.nextBtn.textContent = fullyMastered ? "繼續練習" : "用同概念換題再練";
      }
    }

    function renderReview() {
      const topic = state.current.topic;
      const rows = conceptNotes[topic].map(([key, note]) => `<tr><th>${key}</th><td>${note}</td></tr>`).join("");
      els.reviewBox.innerHTML = `
        <h2 style="font-size:1.05rem;margin:0;">${topics[topic]} 觀念表</h2>
        <table class="mini-table"><tbody>${rows}</tbody></table>
      `;
      els.reviewBox.classList.toggle("show");
    }

    function updateStats() {
      els.answered.textContent = String(state.answered);
      els.accuracy.textContent = state.answered ? `${Math.round((state.correct / state.answered) * 100)}%` : "-";
      els.examProgress.textContent = state.mode === "exam"
        ? `${Math.min(state.examIndex + (state.locked ? 0 : 1), state.examQueue.length || state.examTotal)} / ${state.examQueue.length || state.examTotal}`
        : "-";
      const sorted = Object.entries(state.weak).sort((a, b) => b[1] - a[1]);
      const mistakeSorted = Object.entries(state.mistakes).sort((a, b) => b[1] - a[1]);
      els.weakest.textContent = sorted[0][1] > 0
        ? `${topics[sorted[0][0]]}｜${mistakeSorted[0][1] > 0 ? mistakeLabel[mistakeSorted[0][0]] : "待觀察"}`
        : "尚未累積";
      els.topicList.innerHTML = "";
      Object.entries(topics).forEach(([key, label]) => {
        const row = document.createElement("div");
        row.className = "topic-row";
        const count = state.weak[key];
        row.innerHTML = `<span>${label}</span><strong class="${count ? "weak" : ""}">${count}</strong>`;
        els.topicList.appendChild(row);
      });
      renderDashboard();
    }

    function renderBars(container, rows, emptyText) {
      container.innerHTML = "";
      const max = Math.max(...rows.map((row) => row.value), 1);
      const visible = rows.filter((row) => row.value > 0);
      if (!visible.length) {
        container.innerHTML = `<div class="sync-status">${emptyText}</div>`;
        return;
      }
      visible.forEach((row) => {
        const div = document.createElement("div");
        div.className = "bar-row";
        div.innerHTML = `
          <span>${row.label}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(6, Math.round((row.value / max) * 100))}%"></div></div>
          <strong>${row.value}</strong>
        `;
        container.appendChild(div);
      });
    }

    function renderDashboard() {
      els.dashAccuracy.textContent = state.answered ? `${Math.round((state.correct / state.answered) * 100)}%` : "-";
      const weakSorted = Object.entries(state.weak).sort((a, b) => b[1] - a[1]);
      els.dashWeakest.textContent = weakSorted[0][1] > 0 ? topics[weakSorted[0][0]] : "尚未累積";
      els.dashWrongCount.textContent = `${state.wrongBook.length} 題`;

      renderBars(
        els.topicBars,
        Object.entries(topics).map(([key, label]) => ({
          label,
          value: state.weak[key]
        })),
        "還沒有弱點資料。先做幾題，這裡會自動長出來。"
      );
      renderBars(
        els.mistakeBars,
        Object.entries(mistakeLabel).map(([key, label]) => ({
          label,
          value: state.mistakes[key]
        })),
        "還沒有錯因資料。答錯或低信心答對後會開始累積。"
      );

      if (!state.wrongBook.length) {
        els.wrongList.innerHTML = `<div class="sync-status">目前沒有錯題。答錯或低信心答對的題目會自動收進來。</div>`;
        return;
      }
      els.wrongList.innerHTML = "";
      state.wrongBook.slice(0, 8).forEach((item) => {
        const div = document.createElement("div");
        div.className = "wrong-item";
        const reasonText = item.reasons?.length ? item.reasons.map((key) => mistakeLabel[key]).join("、") : "待觀察";
        div.innerHTML = `
          <small>${topics[item.topic]}｜${reasonText}｜累積 ${item.attempts || 1} 次</small>
          <strong>${item.prompt}</strong>
          <small>你選：${item.selected.join(", ") || "-"}｜正解：${item.correct.join(", ")}</small>
        `;
        els.wrongList.appendChild(div);
      });
    }

    function setMode(mode) {
      state.mode = mode;
      updateModeUi();
      if (mode === "exam") startExam();
      renderQuestion(chooseQuestion());
      updateStats();
      saveProgress();
    }

    function updateModeUi() {
      els.adaptiveMode.classList.toggle("active", state.mode === "adaptive");
      els.weakMode.classList.toggle("active", state.mode === "weak");
      els.randomMode.classList.toggle("active", state.mode === "random");
      els.examMode.classList.toggle("active", state.mode === "exam");
      const help = {
        adaptive: "循序練習：照 Chi-square → t-test/ANOVA → Tree → Ensemble → 評估指標 → 專案解讀走，答錯才插入同概念追問。",
        weak: "補弱點：只集中考你目前錯最多、最不穩的概念。",
        random: "隨機刷題：完全打散題目，不照課程順序，也不因答錯而追問，適合測臨場反應。",
        exam: "模擬考：一次 20 題，適合考前測試整體熟練度。"
      };
      els.modeHelp.textContent = help[state.mode];
    }

    function reset() {
      resetCollections();
      localStorage.removeItem(STORAGE_KEY);
      updateStats();
      saveProgress();
      renderQuestion(chooseQuestion());
    }

    function hasFirebaseConfig() {
      const config = safeParseJson(localStorage.getItem(FIREBASE_CONFIG_KEY));
      return !!(config?.apiKey && config?.authDomain && config?.projectId && config?.appId);
    }

    function hydrateFirebaseSettings() {
      els.firebaseConfigInput.value = localStorage.getItem(FIREBASE_CONFIG_KEY) || "";
      if (hasFirebaseConfig()) {
        els.storagePill.textContent = "可登入";
        els.syncStatus.textContent = "已儲存 Firebase 設定，可使用 Google 登入同步。";
      } else {
        els.storagePill.textContent = "本機";
        els.syncStatus.textContent = "已啟用本機保存；重新整理不會消失。若要跨裝置同步，請先填 Firebase 設定。";
      }
    }

    window.getPracticeSnapshot = getPersistableState;
    window.getStoredPracticeSnapshot = () => safeParseJson(localStorage.getItem(STORAGE_KEY));
    window.applyCloudSnapshot = (snapshot) => {
      applySnapshot(snapshot);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(getPersistableState()));
      updateModeUi();
      updateStats();
      renderQuestion(chooseQuestion());
    };
    window.setSyncUi = ({ status, pill, buttonText } = {}) => {
      if (status) els.syncStatus.textContent = status;
      if (pill) els.storagePill.textContent = pill;
      if (buttonText) els.googleBtn.textContent = buttonText;
    };

    els.submitBtn.addEventListener("click", submitAnswer);
    els.skipBtn.addEventListener("click", () => {
      renderQuestion(chooseQuestion());
      saveProgress();
    });
    els.nextBtn.addEventListener("click", () => {
      if (state.mode === "exam" && state.examIndex >= state.examQueue.length) {
        setMode("weak");
        return;
      }
      renderQuestion(chooseQuestion());
      updateStats();
    });
    els.reviewBtn.addEventListener("click", renderReview);
    els.adaptiveMode.addEventListener("click", () => setMode("adaptive"));
    els.weakMode.addEventListener("click", () => setMode("weak"));
    els.randomMode.addEventListener("click", () => setMode("random"));
    els.examMode.addEventListener("click", () => setMode("exam"));
    els.resetBtn.addEventListener("click", reset);
    els.syncSettingsBtn.addEventListener("click", () => {
      els.syncSettings.classList.toggle("show");
    });
    els.saveFirebaseBtn.addEventListener("click", () => {
      const config = parseFirebaseConfigInput(els.firebaseConfigInput.value);
      if (!config?.apiKey || !config?.authDomain || !config?.projectId || !config?.appId) {
        els.syncStatus.textContent = "Firebase 設定格式不完整。請直接貼 Firebase 畫面中 const firebaseConfig = { ... } 那整段，或只貼 { ... }。";
        return;
      }
      localStorage.setItem(FIREBASE_CONFIG_KEY, JSON.stringify(config));
      hydrateFirebaseSettings();
      els.syncStatus.textContent = "Firebase 設定已儲存，頁面會自動重新載入以啟用 Google 登入。";
      alert("Firebase 設定已儲存。頁面會自動重新整理，重新整理後請按 Google 登入。");
      setTimeout(() => window.location.reload(), 900);
    });
    els.clearFirebaseBtn.addEventListener("click", () => {
      localStorage.removeItem(FIREBASE_CONFIG_KEY);
      hydrateFirebaseSettings();
    });
    els.googleBtn.addEventListener("click", () => {
      if (window.startGoogleSignIn) {
        window.startGoogleSignIn();
        return;
      }
      els.syncSettings.classList.add("show");
      els.syncStatus.textContent = "Google 登入尚未啟用。請先填 Firebase 設定並重新整理。";
    });

    loadLocalProgress();
    hydrateFirebaseSettings();
    updateModeUi();
    updateStats();
    renderQuestion(chooseQuestion());
  </script>
  <script type="module">
    const configText = localStorage.getItem("dsdsFinalPracticeFirebaseConfig");
    const config = configText ? JSON.parse(configText) : null;
    const hasConfig = !!(config?.apiKey && config?.authDomain && config?.projectId && config?.appId);

    if (hasConfig) {
      try {
        const [{ initializeApp }, authLib, firestoreLib] = await Promise.all([
          import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js"),
          import("https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js"),
          import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js")
        ]);
        const {
          getAuth,
          GoogleAuthProvider,
          signInWithPopup,
          signInWithRedirect,
          getRedirectResult,
          signOut,
          onAuthStateChanged
        } = authLib;
        const { getFirestore, doc, getDoc, setDoc } = firestoreLib;
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let currentUser = null;
        let cloudReady = false;

        function progressRef(user) {
          return doc(db, "users", user.uid, "dsdsFinalPractice", "progress");
        }

        function describeAuthError(error) {
          const code = error?.code || "unknown";
          const messages = {
            "auth/unauthorized-domain": "這個網域尚未加入 Firebase Authorized domains。請到 Authentication > Settings > Authorized domains 加入 yvonne96073.github.io。",
            "auth/operation-not-allowed": "Firebase Authentication 尚未啟用 Google 登入。請到 Authentication > Sign-in method 開啟 Google。",
            "auth/popup-blocked": "瀏覽器擋住彈出視窗。我會改用重新導向登入。",
            "auth/popup-closed-by-user": "登入視窗被關閉或被瀏覽器中斷。請再按一次，或改用重新導向登入。",
            "auth/cancelled-popup-request": "上一個登入視窗還沒完成就開了新的。請等幾秒再按一次。",
            "auth/network-request-failed": "網路連線失敗，請確認可以連到 Firebase/Google。"
          };
          return `${messages[code] || "Google 登入失敗，請檢查 Firebase Authentication 與 Authorized domains 設定。"}（${code}）`;
        }

        window.startGoogleSignIn = async () => {
          if (currentUser) return signOut(auth);
          window.setSyncUi?.({ status: "正在開啟 Google 登入視窗..." });
          try {
            await signInWithPopup(auth, provider);
          } catch (error) {
            const message = describeAuthError(error);
            window.setSyncUi?.({ pill: "登入失敗", status: message });
            if (["auth/popup-blocked", "auth/popup-closed-by-user"].includes(error?.code)) {
              window.setSyncUi?.({ status: `${message} 3 秒後改用整頁重新導向登入。` });
              setTimeout(() => signInWithRedirect(auth, provider), 3000);
            }
          }
        };

        window.saveCloudProgress = async (snapshot) => {
          if (!currentUser || !cloudReady) return;
          await setDoc(progressRef(currentUser), {
            ...snapshot,
            uid: currentUser.uid,
            email: currentUser.email || null
          }, { merge: true });
        };

        getRedirectResult(auth).catch((error) => {
          window.setSyncUi?.({ pill: "登入失敗", status: describeAuthError(error) });
        });

        onAuthStateChanged(auth, async (user) => {
          currentUser = user;
          if (!user) {
            cloudReady = false;
            window.setSyncUi?.({
              pill: "可登入",
              buttonText: "Google 登入",
              status: "已儲存 Firebase 設定；登入後可跨裝置同步。"
            });
            return;
          }

          window.setSyncUi?.({
            pill: "雲端",
            buttonText: "登出",
            status: `已登入 ${user.displayName || user.email || "Google 帳號"}，正在同步學習紀錄。`
          });

          const ref = progressRef(user);
          const cloudDoc = await getDoc(ref);
          const localSnapshot = window.getStoredPracticeSnapshot?.() || window.getPracticeSnapshot?.();
          if (cloudDoc.exists()) {
            const cloudSnapshot = cloudDoc.data();
            const cloudTime = Date.parse(cloudSnapshot.savedAt || 0);
            const localTime = Date.parse(localSnapshot?.savedAt || 0);
            if (cloudTime > localTime) {
              window.applyCloudSnapshot?.(cloudSnapshot);
            } else if (localSnapshot) {
              await setDoc(ref, { ...localSnapshot, uid: user.uid, email: user.email || null }, { merge: true });
            }
          } else if (localSnapshot) {
            await setDoc(ref, { ...localSnapshot, uid: user.uid, email: user.email || null }, { merge: true });
          }
          cloudReady = true;
          window.setSyncUi?.({
            pill: "雲端",
            buttonText: "登出",
            status: "Google 雲端同步已啟用；本機與雲端會一起保存。"
          });
        });
      } catch (error) {
        window.setSyncUi?.({
          pill: "本機",
          status: `Google 同步初始化失敗，目前使用本機保存。錯誤：${error.message}`
        });
      }
    }
  </script>
